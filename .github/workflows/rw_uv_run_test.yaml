#################################################################################################################################
#
# Workflow Description:
#     Use UV to run testing by specific type with all test items via PyTest and generate its testing
#     coverage report (it would save reports by 'actions/upload-artifact').
#     
#     Note: This workflow gracefully skips test execution if no tests are found in the specified path,
#     instead of failing. This is useful for new packages or packages without tests.
#
# Workflow input parameters:
#     * test_type: The testing type. In generally, it only has 2 options: 'unit-test' and 'integration-test'.
#     * all_test_items_paths: The target paths of test items under test.
#     * install_dependency_with_group: Install the dependency by UV configuration with dependency group setting. This parameter receive the dependency group naming.
#     * pre_test_script: Shell script or bash command to run before executing tests (optional).
#     * python-versions: JSON array of Python versions to test against. Default: '["3.13"]'
#     * operating-systems: JSON array of operating systems to test on. Default: '["ubuntu-latest", "ubuntu-22.04", "macos-latest", "macos-14"]'
#
# Workflow running output:
#     * Outputs:
#         * tests-executed: Whether tests were actually executed (true/false). False if no tests were found.
#         * has-coverage: Whether coverage reports were generated (true/false).
#         * tests-skipped: Whether tests were skipped due to no test files found (true/false).
#
#     * Upload-Artifact:
#         * coverage: The test coverage report which be generated by PyTest, and it's recorded after run test done.
#                     The file name format would be .coverage.<test type>.<runtime os>-<python-version>
#                     Note: Only uploaded if tests were executed.
#
#################################################################################################################################

name: Run test items via PyTest

on:
  workflow_call:
    inputs:
      test_type:
        description: "The testing type. In generally, it only has 2 options: 'unit-test' and 'integration-test'."
        required: true
        type: string
      project_name:
        description: "Project identifier for monorepo support (used in artifact naming). Leave empty for single-project repos."
        type: string
        required: false
        default: ''
      test_working_directory:
        description: "The working directory for test running."
        required: false
        type: string
        default: './'
      test_folder:
        description: "The folder path for test code."
        required: false
        type: string
        default: './test'
      all_test_items_paths:
        description: "The target paths of test items under test."
        required: false
        type: string
        default: '["./test"]'
      install_dependency_with_group:
        description: "Install the dependency by UV configuration with dependency group setting. This parameter receive the dependency group naming. (multiple values allowed)"
        type: string
        required: false
        default: ''
      with-environment-variables:
        description: "Set the specific environment for the environment variables."
        type: string
        required: false
        default: ''
      pre_test_script:
        description: "Shell script or bash command to run before executing tests (e.g., 'curl -s https://slack.com/api/auth.test -H \"Authorization: Bearer $SLACK_BOT_TOKEN\"')."
        type: string
        required: false
        default: ''
      max-parallel:
        description: "Set the max-parallel jobs."
        type: number
        required: false
        default: 0
      python-versions:
        description: "JSON array of Python versions to test against."
        type: string
        required: false
        default: '["3.13"]'
      operating-systems:
        description: "JSON array of operating systems to test on."
        type: string
        required: false
        default: '["ubuntu-latest", "ubuntu-22.04", "macos-latest", "macos-14"]'
      handle-coverage-report:
        description: "Enable to rename and upload pytest coverage reports."
        type: boolean
        required: false
        default: true
    secrets:
      e2e_test_api_token:
        description: "Set the API token for end-to-end test if it needs."
        required: false
    outputs:
      tests-executed:
        description: "Whether tests were actually executed (true/false). False if no tests were found."
        value: ${{ jobs.run_test_items.outputs.tests_executed }}
      has-coverage:
        description: "Whether coverage reports were generated (true/false)."
        value: ${{ jobs.run_test_items.outputs.has_coverage }}
      tests-skipped:
        description: "Whether tests were skipped due to no test files found (true/false)."
        value: ${{ jobs.run_test_items.outputs.tests_skipped }}

jobs:
  run_test_items:
    strategy:
      max-parallel: ${{ inputs.max-parallel }}
      matrix:
        python-version: ${{fromJson(inputs.python-versions)}}
        os: ${{fromJson(inputs.operating-systems)}}
        test-path: ${{fromJson(inputs.all_test_items_paths)}}
      fail-fast: false    # Fix issue in GitHub Action: FailFast: cancelling since parallel instance has failed

    runs-on: ${{ matrix.os }}
    outputs:
      tests_executed: ${{ steps.set_outputs.outputs.tests_executed }}
      has_coverage: ${{ steps.set_outputs.outputs.has_coverage }}
      tests_skipped: ${{ steps.set_outputs.outputs.tests_skipped }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Activate the uv virtual environment
        run: |
          uv venv
          . .venv/bin/activate

      - name: Install all the project dependencies
        if: ${{ inputs.install_dependency_with_group == '' }}
        working-directory: ${{ inputs.test_working_directory }}
        run: uv sync --locked --all-extras --dev

      - name: Build Python runtime environment by UV with dependency group *${{ inputs.install_dependency_with_group }}*
        if: ${{ inputs.install_dependency_with_group != '' }}
        working-directory: ${{ inputs.test_working_directory }}
        run: |
          uv sync --locked --all-extras --dev --group=${{ inputs.install_dependency_with_group }}

      - name: Run pre-test script
        if: ${{ inputs.pre_test_script != '' }}
        working-directory: ${{ inputs.test_working_directory }}
        run: |
          ${{ inputs.pre_test_script }}

      - name: Check if tests exist (specific path)
        if: ${{ inputs.test_type == '' }}
        id: check_tests_specific
        working-directory: ${{ inputs.test_working_directory }}
        run: |
          TEST_PATH="${{ matrix.test-path }}"
          if [ -d "$TEST_PATH" ] && find "$TEST_PATH" -name 'test_*.py' -o -name '*_test.py' | grep -q .; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
            echo "✅ Tests found in $TEST_PATH"
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "⏭️ No tests found in $TEST_PATH - skipping test execution"
          fi

      - name: Run the specific tests with pytest
        if: ${{ inputs.test_type == '' && steps.check_tests_specific.outputs.has_tests == 'true' }}
        working-directory: ${{ inputs.test_working_directory }}
        run: |
          # Export additional environment variables if provided
          if [ -n "${{ inputs.with-environment-variables }}" ]; then
            export ${{ inputs.with-environment-variables }}
          fi
          E2E_TEST_API_TOKEN=${{ secrets.e2e_test_api_token }} uv run pytest ${{ matrix.test-path }}
        continue-on-error: ${{ inputs.keep_run_if_test_fail }}
        env:
          E2E_TEST_API_TOKEN: ${{ secrets.e2e_test_api_token }}

      - name: Check if tests exist (test folder)
        if: ${{ inputs.test_type != '' }}
        id: check_tests_folder
        working-directory: ${{ inputs.test_working_directory }}
        run: |
          TEST_FOLDER="${{ inputs.test_folder }}"
          if [ -d "$TEST_FOLDER" ] && find "$TEST_FOLDER" -name 'test_*.py' -o -name '*_test.py' | grep -q .; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
            echo "✅ Tests found in $TEST_FOLDER"
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "⏭️ No tests found in $TEST_FOLDER - skipping test execution"
          fi

      - name: Run ${{ inputs.test_type }} tests with pytest
        if: ${{ inputs.test_type != '' && steps.check_tests_folder.outputs.has_tests == 'true' }}
        working-directory: ${{ inputs.test_working_directory }}
        run: |
          # Export additional environment variables if provided
          if [ -n "${{ inputs.with-environment-variables }}" ]; then
            export ${{ inputs.with-environment-variables }}
          fi
          E2E_TEST_API_TOKEN=${{ secrets.e2e_test_api_token }} uv run pytest ${{ inputs.test_folder }}
        continue-on-error: ${{ inputs.keep_run_if_test_fail }}
        env:
          E2E_TEST_API_TOKEN: ${{ secrets.e2e_test_api_token }}

      - name: Rename the code coverage result file
        if: ${{ inputs.handle-coverage-report && ((inputs.test_type == '' && steps.check_tests_specific.outputs.has_tests == 'true') || (inputs.test_type != '' && steps.check_tests_folder.outputs.has_tests == 'true')) }}
        working-directory: ${{ inputs.test_working_directory }}
        run: |
          if [ -f "./.coverage" ]; then
            mv ./.coverage ./.coverage.${{ inputs.test_type }}.${{ matrix.os }}-${{ matrix.python-version }}
            echo "✅ Coverage file renamed"
          else
            echo "⚠️ No coverage file found - skipping rename"
          fi

      - name: Upload code coverage result file
        if: ${{ inputs.handle-coverage-report && ((inputs.test_type == '' && steps.check_tests_specific.outputs.has_tests == 'true') || (inputs.test_type != '' && steps.check_tests_folder.outputs.has_tests == 'true')) }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.project_name != '' && format('coverage_{0}_{1}_{2}_{3}', inputs.project_name, inputs.test_type, matrix.os, matrix.python-version) || format('coverage_{0}_{1}_{2}', inputs.test_type, matrix.os, matrix.python-version) }}
          path: ${{ inputs.test_working_directory }}/.coverage.${{ inputs.test_type }}.${{ matrix.os }}-${{ matrix.python-version }}
          if-no-files-found: warn
          include-hidden-files: true

      - name: Set workflow outputs
        id: set_outputs
        if: always()
        run: |
          # Determine if tests were executed
          HAS_TESTS_SPECIFIC="${{ steps.check_tests_specific.outputs.has_tests }}"
          HAS_TESTS_FOLDER="${{ steps.check_tests_folder.outputs.has_tests }}"
          
          if [ "$HAS_TESTS_SPECIFIC" = "true" ] || [ "$HAS_TESTS_FOLDER" = "true" ]; then
            echo "tests_executed=true" >> $GITHUB_OUTPUT
            echo "tests_skipped=false" >> $GITHUB_OUTPUT
            echo "✅ Tests were executed"
          else
            echo "tests_executed=false" >> $GITHUB_OUTPUT
            echo "tests_skipped=true" >> $GITHUB_OUTPUT
            echo "⏭️ Tests were skipped (no tests found)"
          fi
          
          # Determine if coverage was generated
          if [ -f "${{ inputs.test_working_directory }}.coverage.${{ inputs.test_type }}.${{ matrix.os }}-${{ matrix.python-version }}" ]; then
            echo "has_coverage=true" >> $GITHUB_OUTPUT
            echo "📊 Coverage report available"
          else
            echo "has_coverage=false" >> $GITHUB_OUTPUT
            echo "📊 No coverage report generated"
          fi
