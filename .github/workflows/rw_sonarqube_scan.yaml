###################################################################################################################################
#
# Workflow Description:
#     Trigger SonarQube cloud service to scan entire project to check code quality, security, etc.
#
# Workflow input parameters:
#     * General arguments:
#         * test_type: The testing type. In generally, it only has 2 options: 'unit-test' and 'integration-test'.
#         * download_path: The path to download testing coverage reports via 'actions/download-artifact'.
#         * sonar_host_url: The server host URL about SonarQube scanning mechanism.
#
#     * Secret arguments:
#         * sonar_token: The API token for triggering SonarQube cloud service.
#
# Workflow running output:
#     No and do nothing.
#
###################################################################################################################################

name: SoarQube cloud scan and analyse project

on:
  workflow_call:
    inputs:
      test_type:
        description: "The testing type. In generally, it only has 2 options: 'unit-test' and 'integration-test'."
        required: false
        type: string
        default: all-test
      project_name:
        description: "Project identifier for monorepo (filters coverage artifacts by project). Leave empty for single-project repos."
        type: string
        required: false
        default: ''
      project_working_directory:
        description: "Working directory for the project to scan. For monorepo, specify the package directory."
        type: string
        required: false
        default: './'
      sonar_project_key:
        description: "SonarQube project key (required for multi-project monorepo). Leave empty to use default from sonar-project.properties."
        type: string
        required: false
        default: ''
      download_path:
        description: "The path to download testing coverage reports via 'actions/download-artifact@v3'."
        type: string
        required: false
        default: ./
      sonar_host_url:
        description: "The server host URL about SonarQube scanning mechanism."
        required: false
        type: string
        default: https://sonarcloud.io

    secrets:
      sonar_token:
        description: "The API token for uploading testing coverage report to Coveralls."
        required: true


jobs:
  upload_test_cov_report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Download code coverage result files which has be handled by different test type process
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.project_name != '' && format('{0}_{1}_coverage_xml_report', inputs.project_name, inputs.test_type) || format('{0}_coverage_xml_report', inputs.test_type) }}
          path: ${{ inputs.project_working_directory }}${{ inputs.download_path }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        with:
          projectBaseDir: ${{ inputs.project_working_directory }}
          args: ${{ inputs.sonar_project_key != '' && format('-Dsonar.projectKey={0}', inputs.sonar_project_key) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.sonar_token }}
          SONAR_HOST_URL: ${{ inputs.sonar_host_url }}
