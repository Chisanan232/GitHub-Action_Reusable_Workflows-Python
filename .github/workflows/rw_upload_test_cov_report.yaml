###################################################################################################################################
#
# Workflow Description:
#     Upload the testing coverage reports to Codecov.
#
# Workflow input parameters:
#     * General arguments:
#         * download_path: The path to download testing coverage reports via 'actions/download-artifact@v3'.
#         * test_type: The testing type. In generally, it only has 2 options: 'unit-test' and 'integration-test'.
#         * run_with_python_version: The Python version you want to use in this workflow.
#         * test_working_directory: The working directory for test running.
#         * upload-to-codecov: If it's true, it would upload testing coverage report for Codecov (https://codecov.io).
#         * codecov_flags: The flags of the testing coverage report for Codecov. This option would be required if 'upload-to-codecov' is true.
#         * codecov_name: The name of the testing coverage report for Codecov. This option would be required if 'upload-to-codecov' is true.
#         * upload-to-coveralls: If it's true, it would upload testing coverage report for Coveralls (https://coveralls.io).
#         * upload-to-codacy: If it's true, it would upload testing coverage report for Codacy (https://app.codacy.com/).
#
#     * Secret arguments:
#         * codecov_token: The API token for uploading testing coverage report to Codecov.
#         * coveralls_token: The API token for uploading testing coverage report to Coveralls.
#         * codacy_token: The API token for uploading testing coverage report to Codacy.
#
# Workflow running output:
#     No and do nothing.
#
###################################################################################################################################

name: Upload test report to Codecov

on:
  workflow_call:
    inputs:
      download_path:
        description: "The path to download testing coverage reports via 'actions/download-artifact@v3'."
        type: string
        required: false
        default: ./
      test_type:
        description: "The testing type. In generally, it only has 2 options: 'unit-test' and 'integration-test'."
        required: true
        type: string
      project_name:
        description: "Project identifier for monorepo (filters coverage artifacts by project). Leave empty for single-project repos."
        type: string
        required: false
        default: ''
      run_with_python_version:
        description: "The Python version you want to use in this workflow."
        type: string
        required: false
        default: '3.12'
      test_working_directory:
        description: "The working directory for test running."
        required: false
        type: string
        default: './'
      upload-to-codecov:
        description: "If it's true, it would upload testing coverage report for Codecov (https://codecov.io)."
        type: boolean
        required: false
        default: false
      codecov_flags:
        description: "The flags of the testing coverage report for Codecov. This option would be required if 'upload-to-codecov' is true."
        type: string
        required: false
        default: ''
      codecov_name:
        description: "The name of the testing coverage report for Codecov. This option would be required if 'upload-to-codecov' is true."
        type: string
        required: false
        default: ''
      upload-to-coveralls:
        description: "If it's true, it would upload testing coverage report for Coveralls (https://coveralls.io)."
        type: boolean
        required: false
        default: false
      upload-to-codacy:
        description: "If it's true, it would upload testing coverage report for Codacy (https://app.codacy.com/)."
        type: boolean
        required: false
        default: false

    secrets:
      codecov_token:
        description: "The API token for uploading testing coverage report to Codecov."
        required: false
      coveralls_token:
        description: "The API token for uploading testing coverage report to Coveralls."
        required: false
      codacy_token:
        description: "The API token for uploading testing coverage report to Codacy."
        required: false


jobs:
  upload_test_cov_report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download shell script for checking input parameters
        run: |
          mkdir -p ./scripts/ci
          echo "Download shell script for checking input parameters ..."
          curl https://raw.githubusercontent.com/Chisanan232/GitHub-Action_Reusable_Workflows-Python/develop/scripts/ci/check-input-params.sh --output ./scripts/ci/check-input-params.sh

      - name: Check the workflow input parameter
        run: | 
          echo "Check the parameters of uploading report to Codecov ..."
          bash ./scripts/ci/check-input-params.sh ${{ inputs.upload-to-codecov }} ${{ secrets.codecov_token }}

          echo "Check the parameters of uploading report to Coveralls ..."
          bash ./scripts/ci/check-input-params.sh ${{ inputs.upload-to-coveralls }} ${{ secrets.coveralls_token }}

          echo "Check the parameters of uploading report to Codacy ..."
          bash ./scripts/ci/check-input-params.sh ${{ inputs.upload-to-codacy }} ${{ secrets.codacy_token }}

      - name: Check if coverage artifacts exist
        id: check_artifacts
        uses: actions/github-script@v9
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            
            const dataArtifactName = '${{ inputs.project_name != '' && format('{0}_{1}_coverage_data_file', inputs.project_name, inputs.test_type) || format('{0}_coverage_data_file', inputs.test_type) }}';
            const xmlArtifactName = '${{ inputs.project_name != '' && format('{0}_{1}_coverage_xml_report', inputs.project_name, inputs.test_type) || format('{0}_coverage_xml_report', inputs.test_type) }}';
            
            const hasDataArtifact = artifacts.data.artifacts.some(a => a.name === dataArtifactName);
            const hasXmlArtifact = artifacts.data.artifacts.some(a => a.name === xmlArtifactName);
            
            core.setOutput('has_data_artifact', hasDataArtifact);
            core.setOutput('has_xml_artifact', hasXmlArtifact);
            core.setOutput('has_any_artifact', hasDataArtifact || hasXmlArtifact);
            
            if (hasDataArtifact || hasXmlArtifact) {
              console.log('✅ Coverage artifacts found');
              if (hasDataArtifact) console.log(`  - ${dataArtifactName}`);
              if (hasXmlArtifact) console.log(`  - ${xmlArtifactName}`);
            } else {
              console.log('⏭️ No coverage artifacts found - will skip upload');
            }

      - name: Download code coverage result files which has be handled by different test type process
        if: steps.check_artifacts.outputs.has_data_artifact == 'true'
        uses: actions/download-artifact@v8
        id: download_coverage_data
        with:
          name: ${{ inputs.project_name != '' && format('{0}_{1}_coverage_data_file', inputs.project_name, inputs.test_type) || format('{0}_coverage_data_file', inputs.test_type) }}
          path: ${{ inputs.download_path }}

      - name: Download code coverage result files which has be handled by different test type process
        if: steps.check_artifacts.outputs.has_xml_artifact == 'true'
        uses: actions/download-artifact@v8
        id: download_coverage_xml
        with:
          name: ${{ inputs.project_name != '' && format('{0}_{1}_coverage_xml_report', inputs.project_name, inputs.test_type) || format('{0}_coverage_xml_report', inputs.test_type) }}
          path: ${{ inputs.download_path }}

      - name: Check if coverage files exist
        if: steps.check_artifacts.outputs.has_any_artifact == 'true'
        id: check_coverage
        run: |
          HAS_XML=false
          HAS_DATA=false
          
          if [ -f "${{ inputs.download_path }}/coverage_${{ inputs.test_type }}.xml" ]; then
            HAS_XML=true
            echo "✅ Coverage XML file found"
          else
            echo "⚠️ Coverage XML file not found"
          fi
          
          if [ -f "${{ inputs.download_path }}/.coverage" ]; then
            HAS_DATA=true
            echo "✅ Coverage data file (.coverage) found"
          else
            echo "⚠️ Coverage data file (.coverage) not found"
          fi
          
          if [ "$HAS_XML" = "true" ] || [ "$HAS_DATA" = "true" ]; then
            echo "has_coverage=true" >> $GITHUB_OUTPUT
            echo "✅ Coverage files available for upload"
          else
            echo "has_coverage=false" >> $GITHUB_OUTPUT
            echo "⏭️ No coverage files found - skipping upload"
          fi

      - name: Install Python ${{ inputs.run_with_python_version }}
#        if: ${{ inputs.upload-to-codecov == true || inputs.upload-to-coveralls == true }}
        if: ${{ inputs.upload-to-coveralls == true }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.run_with_python_version }}

      - name: Install Python dependencies about handling testing coverage report
        if: ${{ inputs.upload-to-coveralls == true }}
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -U pip

#      - name: Install Python dependencies about tool of Codecov
#        if: ${{ inputs.upload-to-codecov == true }}
#        run: pip3 install codecov

#      - name: Upload coverage report to Codecov https://codecov.io
#        if: ${{ inputs.upload-to-codecov == true }}
#        run: |
#          codecov \
#            -t ${{ secrets.codecov_token }} \
#            --file coverage_${{ inputs.test_type }}.xml \
#            --flags ${{ inputs.codecov_flags }} \
#            --env OS,PYTHON \
#            --name ${{ inputs.codecov_name }} \
#            --required \
#            --verbose

      - name: Upload coverage report to Codecov https://codecov.io
        if: ${{ inputs.upload-to-codecov == true && steps.check_coverage.outputs.has_coverage == 'true' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.codecov_token }}
          files: coverage_${{ inputs.test_type }}.xml
          flags: ${{ inputs.codecov_flags }}
          env_vars: OS,PYTHON
          name: ${{ inputs.codecov_name }}
          verbose: true
          fail_ci_if_error: false

      - name: Install Python dependencies about tool of Coveralls
        if: ${{ inputs.upload-to-coveralls == true }}
        run: pip3 install coveralls

      - name: Upload coverage report to Coveralls https://coveralls.io
        if: ${{ inputs.upload-to-coveralls == true && steps.check_coverage.outputs.has_coverage == 'true' }}
        working-directory: ${{ inputs.test_working_directory }}
        env:
          GITHUB_TOKEN: ${{ secrets.coveralls_token }}
        run: coveralls --verbose

      - name: Upload testing report to Codacy https://app.codacy.com/
        if: ${{ inputs.upload-to-codacy == true && steps.check_coverage.outputs.has_coverage == 'true' }}
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.codacy_token }}
          coverage-reports: coverage_${{ inputs.test_type }}.xml
#          coverage-reports: cobertura.xml
